services:
  app:
    image: nginx:1.27-alpine
    container_name: livestream-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: livestream-php
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: livestream
      DB_USER: livestream
      DB_PASSWORD: livestream
      JWT_SECRET: change-this-jwt-secret

  db:
    image: mysql:8.4
    container_name: livestream-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: livestream
      MYSQL_USER: livestream
      MYSQL_PASSWORD: livestream
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
